name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    name: Pre-publish tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -m "not live" -v --tb=short

      - name: Run lint
        run: |
          pip install flake8
          flake8 navpy/ --max-line-length=120 --ignore=E501,W503 --count

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify with twine
        run: twine check dist/*

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: [build]

    environment:
      name: testpypi
      url: https://test.pypi.org/p/navpy

    permissions:
      id-token: write

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test:
    name: Smoke test TestPyPI install
    runs-on: ubuntu-latest
    needs: [publish-testpypi]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Install from TestPyPI
        run: |
          for i in 1 2 3 4 5; do
            pip install \
              --index-url https://test.pypi.org/simple/ \
              --extra-index-url https://pypi.org/simple/ \
              navpy==${{ steps.version.outputs.VERSION }} && break
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done

      - name: Smoke test
        run: |
          python -c "
          import navpy
          print('Version:', navpy.__version__)
          assert hasattr(navpy, 'get')
          assert hasattr(navpy, 'search')
          assert hasattr(navpy, 'compare')
          assert hasattr(navpy, 'list_benchmarks')
          print('All checks passed')
          "

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [smoke-test]

    environment:
      name: pypi
      url: https://pypi.org/p/navpy

    permissions:
      id-token: write

    steps:
      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-pypi]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download distribution
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "navpy v${{ steps.version.outputs.VERSION }}"
          body: |
            ## navpy v${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            pip install navpy==${{ steps.version.outputs.VERSION }}
            ```
          files: dist/*
          draft: false
          prerelease: false
